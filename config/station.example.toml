# Tamping-station configuration (schema v1)
#
# This file defines the static geometric relationship between the Quanergy
# sensor and the tamping-station coordinate frame, plus per-hammer ROIs.
#
# See: ref/plans/quanergy_tamping_station_y_axis_modification_plan.md §6

schema_version = 1
station_id = "tamping-station-01"

[frames]
source = "quanergy_sensor"
target = "station"
length_unit = "m"

[scanner]
serial = ""
mount_description = "fixed overhead, downward-facing"
extrinsic_id = "station-01-scanner-2026-06-25"

[scanner.extrinsic]
kind = "matrix"
# Candidate initial matrix (roll=180°, yaw=0°, pitch=0°):
#   sensor +X → station +X
#   sensor +Y → station -Y
#   sensor +Z → station -Z
#   sensor origin → (0.20, 0.68, 7.85) m station
# This matrix MUST be replaced by a field-calibrated extrinsic before
# production use.
matrix_4x4 = [
  [1.0,  0.0,  0.0, 0.20],
  [0.0, -1.0,  0.0, 0.68],
  [0.0,  0.0, -1.0, 7.85],
  [0.0,  0.0,  0.0, 1.00],
]

[scanner.calibration]
calibrated_at = ""
method = "initial_manual"
rms_error_m = 0.0
max_error_m = 0.0
notes = "Initial matrix only; field calibration required."

[hammers]
axis = "y"
axis_x_m = 0.0
vertical_axis = "z"
assignment = "nearest_y_center"
default_roi_half_x_m = 0.15
default_roi_half_y_m = 0.10
default_z_min_m = 0.0
default_z_max_m = 5.0
minimum_points = 100

# --- Hammer definitions ---
# y_m values below are placeholders; replace with field-measured positions.

[[hammers.items]]
id = "H01"
enabled = true
y_m = 0.0
x_offset_m = 0.0

[[hammers.items]]
id = "H02"
enabled = true
y_m = 1.0
x_offset_m = 0.0

[[hammers.items]]
id = "H03"
enabled = true
y_m = 2.0
x_offset_m = 0.0
